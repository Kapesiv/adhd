<!doctype html>
<html lang="fi">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
		<meta name="theme-color" content="#08090c" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Concentra" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192x192.png" />
		<script>
			(function () {
				if (typeof window === 'undefined') return;

				var RESET_KEY = 'concentra-boot-reset-v2';
				var RELOAD_KEY = 'concentra-boot-reload-v2';
				var params = new URLSearchParams(window.location.search);
				var shouldReset = params.has('reset') || !sessionStorage.getItem(RESET_KEY);

				function showBootError(message) {
					var existing = document.getElementById('boot-error');
					if (existing) return;

					var panel = document.createElement('div');
					panel.id = 'boot-error';
					panel.setAttribute(
						'style',
						[
							'position:fixed',
							'inset:16px',
							'z-index:99999',
							'display:flex',
							'flex-direction:column',
							'justify-content:center',
							'gap:12px',
							'padding:20px',
							'border-radius:16px',
							'background:#11151c',
							'border:1px solid rgba(249,115,22,0.35)',
							'color:#f3f4f6',
							'font:16px/1.45 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif',
							'box-shadow:0 20px 60px rgba(0,0,0,0.45)'
						].join(';')
					);
					panel.innerHTML =
						'<strong style="font-size:18px">Concentra ei käynnistynyt oikein</strong>' +
						'<div style="opacity:.82">Virhe selaimessa tai vanhassa välimuistissa. Voit jatkaa tästä:</div>' +
						'<div style="padding:12px;border-radius:12px;background:rgba(255,255,255,0.04);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;white-space:pre-wrap;word-break:break-word;">' +
						String(message || 'Tuntematon virhe') +
						'</div>' +
						'<button id="boot-error-reload" style="align-self:flex-start;padding:10px 14px;border:none;border-radius:999px;background:#f97316;color:white;font:600 14px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;cursor:pointer;">Lataa sivu uudelleen</button>';
					document.addEventListener(
						'click',
						function (event) {
							var target = event.target;
							if (target && target.id === 'boot-error-reload') {
								sessionStorage.removeItem(RELOAD_KEY);
								window.location.href = window.location.pathname + '?reset=1';
							}
						},
						{ once: true }
					);
					document.body.appendChild(panel);
				}

				window.addEventListener('error', function (event) {
					showBootError(event.message || 'Script error');
				});

				window.addEventListener('unhandledrejection', function (event) {
					var reason = event.reason;
					showBootError(reason && reason.message ? reason.message : String(reason));
				});

				if (!('serviceWorker' in navigator) || !shouldReset) return;

				sessionStorage.setItem(RESET_KEY, '1');

				window.addEventListener('load', function () {
					Promise.resolve()
						.then(function () {
							return navigator.serviceWorker.getRegistrations();
						})
						.then(function (registrations) {
							return Promise.all(
								registrations.map(function (registration) {
									return registration.unregister();
								})
							);
						})
						.catch(function () {})
						.then(function () {
							if (!('caches' in window)) return;
							return caches.keys().then(function (keys) {
								return Promise.all(
									keys.map(function (key) {
										return caches.delete(key);
									})
								);
							});
						})
						.catch(function () {})
						.then(function () {
							var shouldReload =
								params.has('reset') || !sessionStorage.getItem(RELOAD_KEY);
							if (!shouldReload) return;
							sessionStorage.setItem(RELOAD_KEY, '1');
							var clean = new URL(window.location.href);
							clean.searchParams.delete('reset');
							window.location.replace(clean.toString());
						});
				});
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
