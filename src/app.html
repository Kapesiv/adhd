<!doctype html>
<html lang="fi">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
		<meta name="theme-color" content="#08090c" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Concentra" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192x192.png" />
		<script>
			(function () {
				if (typeof window === 'undefined') return;
				if (!('serviceWorker' in navigator)) return;

				const RESET_KEY = 'concentra-emergency-reset-v1';
				const params = new URLSearchParams(window.location.search);
				const shouldReset = params.has('reset') || !sessionStorage.getItem(RESET_KEY);

				if (!shouldReset) return;

				sessionStorage.setItem(RESET_KEY, '1');

				window.addEventListener('load', async () => {
					try {
						const registrations = await navigator.serviceWorker.getRegistrations();
						await Promise.all(registrations.map((registration) => registration.unregister()));
					} catch {}

					try {
						if ('caches' in window) {
							const keys = await caches.keys();
							await Promise.all(keys.map((key) => caches.delete(key)));
						}
					} catch {}

					if (params.has('reset')) {
						const clean = new URL(window.location.href);
						clean.searchParams.delete('reset');
						window.location.replace(clean.toString());
					}
				});
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
